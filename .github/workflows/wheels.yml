name: qwentts-cpp-python wheels

"on":
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "setup.py"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      qwentts_ref:
        description: qwentts.cpp commit, tag, or branch to build
        required: true
        default: eda8b59092b8d7b7142177c599b08909b87f63b4
      cuda_architectures:
        description: CMAKE_CUDA_ARCHITECTURES for portable CUDA binaries
        required: true
        default: 75-virtual;80-virtual;86-real;89-real;90-real;100-real;120-real;120-virtual
      wheel_build_tag:
        description: Optional wheel build tag
        required: true
        default: 1cu128

jobs:
  linux-cuda:
    name: Linux ${{ matrix.arch }} CUDA wheel
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            cuda_repo_arch: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            cuda_repo_arch: sbsa
    env:
      QWENTTS_CPP_BACKEND: cuda
      QWENTTS_CPP_BUILD_JOBS: "2"
      QWENTTS_CPP_WHEEL_BUILD_TAG: ${{ inputs.wheel_build_tag || '1cu128' }}
      QWENTTS_REF: ${{ inputs.qwentts_ref || 'eda8b59092b8d7b7142177c599b08909b87f63b4' }}
      CUDA_ARCHITECTURES: ${{ inputs.cuda_architectures || '75-virtual;80-virtual;86-real;89-real;90-real;100-real;120-real;120-virtual' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet
          sudo apt-get clean

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build patchelf wget ca-certificates

      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/${{ matrix.cuda_repo_arch }}/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cuda-nvcc-12-8 \
            cuda-cudart-dev-12-8 \
            libcublas-dev-12-8
          echo "/usr/local/cuda-12.8/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=/usr/local/cuda-12.8" >> "$GITHUB_ENV"
          echo "CMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc" >> "$GITHUB_ENV"

      - name: Fetch qwentts.cpp
        run: |
          git clone --recursive https://github.com/ServeurpersoCom/qwentts.cpp third_party/qwentts.cpp
          git -C third_party/qwentts.cpp checkout "$QWENTTS_REF"
          git -C third_party/qwentts.cpp submodule update --init --recursive

      - name: Build wheel
        run: |
          python scripts/build_native.py \
            --source third_party/qwentts.cpp \
            --backend cuda \
            --clean \
            --cmake-arg=-G \
            --cmake-arg=Ninja \
            --cmake-arg="-DCMAKE_CUDA_ARCHITECTURES=$CUDA_ARCHITECTURES"
          python -m build --wheel
          mkdir -p wheelhouse
          cp dist/*.whl wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: qwentts-cpp-python-linux-${{ matrix.arch }}-cuda
          path: wheelhouse/*.whl
